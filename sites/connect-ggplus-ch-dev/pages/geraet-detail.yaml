page:
  name: Gerät - Detail (Vollansicht)
  url_pattern: /geraete/geraet/{deviceId}
  purpose: Full device detail page for a single machine. Shows identity, internal name/note, fault reporting, technical data, notifications, maintenance/service history, and document/media attachments.
  screenshot: ""

  elements:
    - name: breadcrumb-device-dropdown
      type: select
      locator:
        strategy: text
        value: Mastrena
      description: Breadcrumb ending in the device name with a dropdown (v) to switch between devices at the same location

    - name: location-reference
      type: text
      locator:
        strategy: text
        value: Gehrig Group AG test
      description: Location ID and name this device belongs to (e.g. 10000 Gehrig Group AG test)

    - name: device-title
      type: text
      locator:
        strategy: role
        value: heading
      description: Device model name as the page heading (e.g. "Mastrena", "Gläser- und Geschirrspülmaschine Hobart GXC-14C")

    - name: connection-status
      type: text
      locator:
        strategy: text
        value: Status
      description: "(IoT/connected devices only) Live connection status with timestamp under a 'Verbindungen' header, e.g. 'Maschine ein, alles Ok (26.06.2026 15:00)' or 'Offline (21.04.2026 15:45)'. Absent for non-connected devices."
      states: [capability-dependent]

    - name: internal-name
      type: text
      locator:
        strategy: text
        value: Interner Name
      description: Editable internal name; pencil icon opens an inline editor. Shows "Kein interner Name vorhanden." when unset.

    - name: internal-note
      type: text
      locator:
        strategy: text
        value: Interne Notiz
      description: Editable internal note. Shows "Keine interne Notiz vorhanden." when unset.

    - name: report-fault-button
      type: button
      locator:
        strategy: text
        value: Störung melden
      description: Red button - starts the fault/Störung report flow for this device

    - name: device-image
      type: container
      locator:
        strategy: role
        value: img
      description: Device illustration (top-right) with a kebab (⋮) menu for device actions

    - name: device-actions-menu
      type: button
      locator:
        strategy: aria-label
        value: more
      description: Kebab (⋮) menu next to the device image - additional device actions

    - name: technische-daten-section
      type: container
      locator:
        strategy: text
        value: Technische Daten
      description: Collapsible section (chevron) with the device's technical specifications

    # --- Tab bar. Only Details + Konnektivität are universal; every other tab is
    #     capability-dependent and present only on devices that support it.
    #     See the tab matrix in gotchas for observed per-device-type variation. ---
    - name: details-tab
      type: link
      locator:
        strategy: text
        value: Details
      description: Tab showing Benachrichtigungen, Wartung und Service, Dokumente, and Medien (default active tab). Present on all devices.

    - name: konnektivitaet-tab
      type: link
      locator:
        strategy: text
        value: Konnektivität
      description: Tab showing the device's connectivity info. For non-connected devices it shows a downloadable QR-code service label; connected devices also expose a Code/Registrieren registration field. Present on all devices.

    - name: maschinenparameter-tab
      type: link
      locator:
        strategy: text
        value: Maschinenparameter
      description: "(capability-dependent) Machine parameters tab - inline-editable device settings with last-change timestamps and valid ranges. Seen on dishwashers, not on the coffee machine."
      states: [capability-dependent]

    - name: waschgaenge-tab
      type: link
      locator:
        strategy: text
        value: Waschgänge
      description: "(capability-dependent) Wash-cycle event log with a Von/Bis date filter. Seen on the Hobart dishwasher; the GEHRIG GTW dishwasher exposes Hygiene + Spülprogramme instead."
      states: [capability-dependent]

    - name: hygiene-tab
      type: link
      locator:
        strategy: text
        value: Hygiene
      description: "(capability-dependent) Hygiene tab. Seen on the GEHRIG GTW dishwasher, not on the Hobart or the coffee machine."
      states: [capability-dependent]

    - name: spuelprogramme-tab
      type: link
      locator:
        strategy: text
        value: Spülprogramme
      description: "(capability-dependent) Wash/rinse programmes tab. Seen on the GEHRIG GTW dishwasher, not on the Hobart or the coffee machine."
      states: [capability-dependent]

    - name: stoerungsmeldungen-tab
      type: link
      locator:
        strategy: text
        value: Störungsmeldungen
      description: "(capability-dependent) Fault/error log with date filter, search, and severity (Schweregrad) filter. Seen on dishwashers, not on the coffee machine."
      states: [capability-dependent]

    - name: qr-code-card
      type: container
      locator:
        strategy: text
        value: QR Code
      description: (Konnektivität tab) Gehrig service label with Kunden-Nr., Maschinen-Typ, Maschinen-Nr., Inbetriebnahme, Kundendienst (0800 22 77 77) and Reinigungsmittel (0800 44 77 77) hotlines, plus the QR image

    - name: qr-download-button
      type: button
      locator:
        strategy: text
        value: Herunterladen
      description: (Konnektivität tab) Downloads the QR-code service label for the device

    # --- Maschinenparameter tab (IoT-only) ---
    - name: parameter-search
      type: input
      locator:
        strategy: text
        value: Parametersuche
      description: "(Maschinenparameter tab, capability-dependent) Search field to find a specific parameter"
      states: [capability-dependent]

    - name: save-all-parameters-button
      type: button
      locator:
        strategy: text
        value: Alles Speichern
      description: "(Maschinenparameter tab, capability-dependent) Save all modified parameters"
      states: [capability-dependent]

    # --- Waschgänge tab (IoT-only) ---
    - name: waschgaenge-date-from
      type: input
      locator:
        strategy: text
        value: Von
      description: "(Waschgänge tab, capability-dependent) Start date filter for wash cycles"
      states: [capability-dependent]

    - name: waschgaenge-date-to
      type: input
      locator:
        strategy: text
        value: Bis
      description: "(Waschgänge tab, capability-dependent) End date filter for wash cycles"
      states: [capability-dependent]

    - name: waschgaenge-refresh-button
      type: button
      locator:
        strategy: text
        value: Aktualisieren
      description: "(Waschgänge tab, capability-dependent) Refresh the wash-cycle list with the current date filter"
      states: [capability-dependent]

    # --- Störungsmeldungen tab (IoT-only) ---
    - name: stoerungen-severity-dropdown
      type: select
      locator:
        strategy: text
        value: Schweregrad
      description: "(Störungsmeldungen tab, capability-dependent) Severity-level filter for the fault log"
      states: [capability-dependent]

    - name: stoerungen-refresh-button
      type: button
      locator:
        strategy: text
        value: Aktualisieren
      description: "(Störungsmeldungen tab, capability-dependent) Refresh the fault-report list with the current filters"
      states: [capability-dependent]

    - name: notifications-panel
      type: container
      locator:
        strategy: text
        value: Benachrichtigungen
      description: Device notifications; shows "zurzeit gibt es keine Benachrichtigungen" when empty

    - name: maintenance-panel
      type: container
      locator:
        strategy: text
        value: Wartung und Service
      description: Maintenance/service summary - Nächste Wartung, Letzte Wartung, GEPLANT, ABGESCHLOSSEN, ABGESCHLOSSEN VOR INSTALLATIONSDATUM

    - name: all-services-link
      type: link
      locator:
        strategy: text
        value: alle Services anzeigen
      description: Link to the full list of maintenance/service orders for this device

    - name: add-document-button
      type: button
      locator:
        strategy: text
        value: Dokument hinzufügen
      description: Add a document attachment to the device (dashed "+" tile under Dokumente)

    - name: add-media-button
      type: button
      locator:
        strategy: text
        value: Medien hinzufügen
      description: Add a media/image attachment to the device (dashed "+" tile under Medien)

  gotchas:
    - This page is reached via "Vollansicht öffnen" from the preview drawer, OR by deep-linking. The URL is /geraete/geraet/{deviceId} - the partner/location segments are DROPPED (unlike the preview URL /geraete/maschinenpark/{partnerId}/{locationId}/geraet/{deviceId}).
    - The header title in the top bar changes to "GERÄT" on this page.
    - The "Störung melden" button starts the fault-report flow - a good candidate for a mapped workflow.
    - Maintenance/service data overlaps with the preview drawer (same Wartung und Service block) but the full page adds Technische Daten, Konnektivität tab, Dokumente, and Medien.
    - Internal name and internal note are inline-editable via the pencil icon.
    - The breadcrumb device-name dropdown lets you jump to sibling devices without going back to the machine list.
    - "CAPABILITY VARIANT: the tab set depends on the device's capabilities, not just on whether it is connected. Only Details + Konnektivität are universal. Observed tab matrix - Mastrena (coffee): Details, Konnektivität. Hobart GXC-14C (dishwasher): + Maschinenparameter, Waschgänge, Störungsmeldungen. GEHRIG GTW 3300-H (dishwasher): + Maschinenparameter, Hygiene, Spülprogramme, Störungsmeldungen. Note two dishwashers differ (Waschgänge vs Hygiene+Spülprogramme). Elements flagged states:[capability-dependent] are ABSENT on devices that don't support them - never assume a mapped tab is present."
    - "Connected devices also show a live connection-status and a Fernwartung (remote maintenance) row with a 'Starten' link under 'Verbindungen', and may show an 'Update verfügbar' badge next to Technische Daten; non-connected devices show none of these."
    - The device UUID in the URL is opaque - do NOT use it as the device identity. Reach a specific device by navigating from the machine list using a stable key (serial number or name), or pass deviceId as a captured/parameter value.
    - "Von/Bis date pickers appear on both Waschgänge and Störungsmeldungen tabs but are independent; both default to roughly a 20-day range."
