page:
  name: Gerät - Detail (Vollansicht)
  url_pattern: /geraete/geraet/{deviceId}
  purpose: Full device detail page for a single machine. Shows identity, internal name/note, fault reporting, technical data, notifications, maintenance/service history, and document/media attachments.
  screenshot: ""

  elements:
    - name: breadcrumb-device-dropdown
      type: select
      locator:
        strategy: text
        value: Mastrena
      description: Breadcrumb ending in the device name with a dropdown (v) to switch between devices at the same location

    - name: location-reference
      type: text
      locator:
        strategy: text
        value: Gehrig Group AG test
      description: Location ID and name this device belongs to (e.g. 10000 Gehrig Group AG test)

    - name: device-title
      type: text
      locator:
        strategy: role
        value: heading
      description: Device model name as the page heading (e.g. "Mastrena", "Gläser- und Geschirrspülmaschine Hobart GXC-14C")

    - name: connection-status
      type: text
      locator:
        strategy: text
        value: Status
      description: "(IoT/connected devices only) Live connection status with timestamp under a 'Verbindungen' header, e.g. 'Maschine ein, alles Ok (26.06.2026 15:00)' or 'Offline (21.04.2026 15:45)'. Absent for non-connected devices."
      states: [iot-only]

    - name: internal-name
      type: text
      locator:
        strategy: text
        value: Interner Name
      description: Editable internal name; pencil icon opens an inline editor. Shows "Kein interner Name vorhanden." when unset.

    - name: internal-note
      type: text
      locator:
        strategy: text
        value: Interne Notiz
      description: Editable internal note. Shows "Keine interne Notiz vorhanden." when unset.

    - name: report-fault-button
      type: button
      locator:
        strategy: text
        value: Störung melden
      description: Red button - starts the fault/Störung report flow for this device

    - name: device-image
      type: container
      locator:
        strategy: role
        value: img
      description: Device illustration (top-right) with a kebab (⋮) menu for device actions

    - name: device-actions-menu
      type: button
      locator:
        strategy: aria-label
        value: more
      description: Kebab (⋮) menu next to the device image - additional device actions

    - name: technische-daten-section
      type: container
      locator:
        strategy: text
        value: Technische Daten
      description: Collapsible section (chevron) with the device's technical specifications

    # --- Tab bar. Non-IoT devices show only Details + Konnektivität;
    #     connected/IoT devices add Maschinenparameter, Waschgänge, Störungsmeldungen. ---
    - name: details-tab
      type: link
      locator:
        strategy: text
        value: Details
      description: Tab showing Benachrichtigungen, Wartung und Service, Dokumente, and Medien (default active tab). Always present.

    - name: konnektivitaet-tab
      type: link
      locator:
        strategy: text
        value: Konnektivität
      description: Tab showing the device's connectivity info. For non-IoT devices it shows a downloadable QR-code service label; connected devices also expose a Code/Registrieren registration field. Always present.

    - name: maschinenparameter-tab
      type: link
      locator:
        strategy: text
        value: Maschinenparameter
      description: "(IoT-only) Machine parameters tab - inline-editable device settings with last-change timestamps and valid ranges."
      states: [iot-only]

    - name: waschgaenge-tab
      type: link
      locator:
        strategy: text
        value: Waschgänge
      description: "(IoT-only) Wash-cycle event log with a Von/Bis date filter."
      states: [iot-only]

    - name: stoerungsmeldungen-tab
      type: link
      locator:
        strategy: text
        value: Störungsmeldungen
      description: "(IoT-only) Fault/error log with date filter, search, and severity (Schweregrad) filter."
      states: [iot-only]

    - name: qr-code-card
      type: container
      locator:
        strategy: text
        value: QR Code
      description: (Konnektivität tab) Gehrig service label with Kunden-Nr., Maschinen-Typ, Maschinen-Nr., Inbetriebnahme, Kundendienst (0800 22 77 77) and Reinigungsmittel (0800 44 77 77) hotlines, plus the QR image

    - name: qr-download-button
      type: button
      locator:
        strategy: text
        value: Herunterladen
      description: (Konnektivität tab) Downloads the QR-code service label for the device

    # --- Maschinenparameter tab (IoT-only) ---
    - name: parameter-search
      type: input
      locator:
        strategy: text
        value: Parametersuche
      description: "(Maschinenparameter tab, IoT-only) Search field to find a specific parameter"
      states: [iot-only]

    - name: save-all-parameters-button
      type: button
      locator:
        strategy: text
        value: Alles Speichern
      description: "(Maschinenparameter tab, IoT-only) Save all modified parameters"
      states: [iot-only]

    # --- Waschgänge tab (IoT-only) ---
    - name: waschgaenge-date-from
      type: input
      locator:
        strategy: text
        value: Von
      description: "(Waschgänge tab, IoT-only) Start date filter for wash cycles"
      states: [iot-only]

    - name: waschgaenge-date-to
      type: input
      locator:
        strategy: text
        value: Bis
      description: "(Waschgänge tab, IoT-only) End date filter for wash cycles"
      states: [iot-only]

    - name: waschgaenge-refresh-button
      type: button
      locator:
        strategy: text
        value: Aktualisieren
      description: "(Waschgänge tab, IoT-only) Refresh the wash-cycle list with the current date filter"
      states: [iot-only]

    # --- Störungsmeldungen tab (IoT-only) ---
    - name: stoerungen-severity-dropdown
      type: select
      locator:
        strategy: text
        value: Schweregrad
      description: "(Störungsmeldungen tab, IoT-only) Severity-level filter for the fault log"
      states: [iot-only]

    - name: stoerungen-refresh-button
      type: button
      locator:
        strategy: text
        value: Aktualisieren
      description: "(Störungsmeldungen tab, IoT-only) Refresh the fault-report list with the current filters"
      states: [iot-only]

    - name: notifications-panel
      type: container
      locator:
        strategy: text
        value: Benachrichtigungen
      description: Device notifications; shows "zurzeit gibt es keine Benachrichtigungen" when empty

    - name: maintenance-panel
      type: container
      locator:
        strategy: text
        value: Wartung und Service
      description: Maintenance/service summary - Nächste Wartung, Letzte Wartung, GEPLANT, ABGESCHLOSSEN, ABGESCHLOSSEN VOR INSTALLATIONSDATUM

    - name: all-services-link
      type: link
      locator:
        strategy: text
        value: alle Services anzeigen
      description: Link to the full list of maintenance/service orders for this device

    - name: add-document-button
      type: button
      locator:
        strategy: text
        value: Dokument hinzufügen
      description: Add a document attachment to the device (dashed "+" tile under Dokumente)

    - name: add-media-button
      type: button
      locator:
        strategy: text
        value: Medien hinzufügen
      description: Add a media/image attachment to the device (dashed "+" tile under Medien)

  gotchas:
    - This page is reached via "Vollansicht öffnen" from the preview drawer, OR by deep-linking. The URL is /geraete/geraet/{deviceId} - the partner/location segments are DROPPED (unlike the preview URL /geraete/maschinenpark/{partnerId}/{locationId}/geraet/{deviceId}).
    - The header title in the top bar changes to "GERÄT" on this page.
    - The "Störung melden" button starts the fault-report flow - a good candidate for a mapped workflow.
    - Maintenance/service data overlaps with the preview drawer (same Wartung und Service block) but the full page adds Technische Daten, Konnektivität tab, Dokumente, and Medien.
    - Internal name and internal note are inline-editable via the pencil icon.
    - The breadcrumb device-name dropdown lets you jump to sibling devices without going back to the machine list.
    - "STRUCTURAL VARIANT: the tab set depends on the device. Non-IoT devices (e.g. the Mastrena coffee machine) show only Details + Konnektivität. Connected/IoT devices (e.g. a Hobart dishwasher) additionally show Maschinenparameter, Waschgänge, and Störungsmeldungen, plus a live connection-status under 'Verbindungen'. Elements flagged states:[iot-only] only render for connected devices."
    - The device UUID in the URL is opaque - do NOT use it as the device identity. Reach a specific device by navigating from the machine list using a stable key (serial number or name), or pass deviceId as a captured/parameter value.
    - "Von/Bis date pickers appear on both Waschgänge and Störungsmeldungen tabs but are independent; both default to roughly a 20-day range."
