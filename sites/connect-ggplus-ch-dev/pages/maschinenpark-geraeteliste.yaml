page:
  name: Maschinenpark - Geräteliste (Standort-Detail)
  url_pattern: /geraete/maschinenpark/{partnerId}/{locationId}
  purpose: Second level of the machine park - shows all machines/devices for a selected location, grouped into Favoriten, Neu (not yet in IoT Hub), and Bestehender Maschinenpark. Click a device row to open its detail page.
  screenshot: ""

  elements:
    - name: location-list-sidebar
      type: container
      locator:
        strategy: text
        value: Standort filtern
      description: Left column keeps the location list (filter + sort + location cards) so you can switch locations without going back

    - name: location-header
      type: container
      locator:
        strategy: text
        value: Gehrig Group AG test
      description: Right-pane header showing selected location ID, name, and address

    - name: add-device-button
      type: button
      locator:
        strategy: aria-label
        value: "+"
      description: Add a new device to this location (+ icon, top-right of the device pane)

    - name: location-settings-button
      type: button
      locator:
        strategy: aria-label
        value: settings
      description: Location settings (gear icon, top-right of the device pane)

    - name: close-pane-button
      type: button
      locator:
        strategy: aria-label
        value: close
      description: Close the device pane (X icon) and return to the location list only

    - name: location-filter
      type: input
      locator:
        strategy: text
        value: Standort filtern
      description: Filter the location sidebar by name/address (live; e.g. "Renens" narrows to the matching location)

    - name: device-filter
      type: input
      locator:
        strategy: text
        value: Geräte filtern
      description: Filter the device list by name or serial number (live; narrows all three sections and updates their count badges)

    - name: device-filter-clear
      type: button
      locator:
        strategy: aria-label
        value: clear
      description: X button that appears inside the device filter when it has text; clears the filter

    - name: no-match-message
      type: text
      locator:
        strategy: text
        value: "Für den angegeben Filter wurden keine Maschinen gefunden."
      description: Empty-state shown inside a section when the active device filter matches nothing in it

    - name: device-grouping-dropdown
      type: select
      locator:
        strategy: text
        value: Gerätegruppierungen
      description: >
        Regrouping-scheme selector (default "IOT-Geräte"). Changes which section
        headers the device list is grouped under. Options - Keine; STANDARD-
        GRUPPIERUNGEN: IOT-Geräte (Favoriten/Neu/Bestehender), Status, Hersteller,
        Modell, Fahrzeugnummer, Fahrzeugtyp; PARTNER-GRUPPIERUNGEN: custom group
        sets defined in settings (e.g. "Test Partner Gruppe" -> GRUPPE #1, #2 ...
        plus "Nicht zu einer Gruppe zugewiesen"). The selection is STICKY (persists
        per user across reload/navigation).
      states: [Keine, "IOT-Geräte", Status, Hersteller, Modell, Fahrzeugnummer, Fahrzeugtyp]

    - name: favoriten-section
      type: container
      locator:
        strategy: text
        value: FAVORITEN
      description: Devices starred as favorites; section header shows device count (e.g. "2 Geräte")

    - name: neu-section
      type: container
      locator:
        strategy: text
        value: NEU (NOCH NICHT IM IOT-HUB)
      description: Newly added devices not yet connected to the IoT Hub; header shows count (e.g. "6 Geräte")

    - name: bestehender-section
      type: container
      locator:
        strategy: text
        value: BESTEHENDER MASCHINENPARK
      description: Existing/connected devices; header shows count (e.g. "121 Geräte"). Long list - scroll to browse.

    - name: device-row
      type: link
      locator:
        strategy: role
        value: row
      description: A single device row with Status icon, favorite star, Gerät (name), and Seriennummer. Click the chevron (>) to open the device detail page.
      children:
        - name: favorite-star
          type: button
          locator:
            strategy: aria-label
            value: favorite
          description: Toggle the device as a favorite (moves it into the Favoriten section)
        - name: status-icon
          type: text
          locator:
            strategy: css
            value: .status-icon
          description: Connection/health status icon (e.g. globe = offline / not yet connected)

    - name: column-headers
      type: container
      locator:
        strategy: text
        value: Seriennummer
      description: Sortable column headers - Status, Gerät, Seriennummer (click to sort each section)

  gotchas:
    - This is the SECOND level - reached by clicking a location row on /geraete/maschinenpark. URL carries partnerId/locationId (e.g. /10000/10000).
    - Note the displayed location ID (10090) differs from the URL IDs (10000/10000) - the URL uses internal partner/location IDs, not the badge number shown on the card.
    - Devices are split into three sections - Favoriten, Neu (noch nicht im IOT-Hub), and Bestehender Maschinenpark - each with its own count badge and sortable columns.
    - The Bestehender Maschinenpark section can be very long (121 devices in test data) - use "Geräte filtern" or scroll.
    - Each device row's chevron (>) opens the device detail page (map separately as geraet-detail).
    - The left location-list sidebar persists; clicking another location swaps the right pane without a full navigation.
    - The X (close) icon collapses the device pane back to the location-list-only view.
    - "STICKY GROUPING: the Gerätegruppierungen selection persists per user across reload/navigation. The Favoriten/Neu/Bestehender section names ONLY exist under the IOT-Geräte grouping; under another grouping (e.g. a Partner-Gruppierung) the sections are GRUPPE #1/#2/... So any test or workflow that targets those sections must first reset the grouping to IOT-Geräte - do not assume the default."
    - "The favorites set is mutable shared test data (which devices are starred changes between sessions). Don't assume a specific device is in Favoriten; assert device identity via the device filter instead of by section."
    - "The device filter and location filter do NOT persist across navigation (only the grouping does); the filter clear X appears only while the field has text."
    - "Section headers depend on the active grouping: IOT-Geräte -> Favoriten/Neu/Bestehender; Status -> Favoriten/Online/Offline; Hersteller/Modell/Fahrzeugtyp -> one section per value; Fahrzeugnummer -> 'FAHRZEUG-NUMMER {n}'; a Partner-Gruppierung -> 'GRUPPE #n' + 'Nicht zu einer Gruppe zugewiesen'; Keine -> Favoriten + a flat list. Favoriten appears under every grouping; Bestehender Maschinenpark only under IOT-Geräte."
    - "The gear (location-settings-button) opens the 'Maschinenpark Einstellungen' MODAL with two tabs: 'Benutzer Einstellungen' (Informations Spalten = which device-list columns show + order; Geräte Information Kacheln = which preview-drawer tiles show + order) and 'Gerätegruppierungen' (create custom Sortierungsgruppierung schemes that appear under PARTNER-GRUPPIERUNGEN in the grouping dropdown). The modal overlays the device pane and intercepts clicks to the grouping dropdown/header while open - close it (Schliessen/X) before interacting with the list."
