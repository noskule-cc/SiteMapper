workflow:
  name: test-maschinenpark-geraeteliste
  description: UI test for the machine-list (Geräteliste) page of a location. Covers structural presence (L1), every STANDARD Gerätegruppierungen option (C), navigation into the device preview (L2), filter re-binding (L4), and device + location filter behaviour (L5).
  site: connect-ggplus-ch-dev
  mode: deterministic

  fixtures:
    partner_id: "10000"
    location_id: "10000"
    location_name: "Gehrig Group AG test"
    device_filter_term: "Mastrena"
    matching_device: "Diverse Kaffee Mastrena"
    non_matching_device: "Diverse Wasseraufbereitung"
    location_filter_term: "Renens"
    location_match: "1020 Renens"
    location_nonmatch: "8152 Glattbrugg"

  setup:
    # Establish a known state - grouping (and sort) persist per user across
    # sessions, so a run must reset them or it inherits leftover state.
    - action: navigate
      page: maschinenpark-geraeteliste
      value: "/geraete/maschinenpark/$partner_id/$location_id"
      description: Open the machine-list page for the fixture location

    - action: wait
      description: Device sections load asynchronously after navigation - wait for the list to render

    - action: input
      page: maschinenpark-geraeteliste
      element: device-grouping-dropdown
      value: "IOT-Geräte"
      description: Reset the (sticky) grouping to IOT-Geräte so the Favoriten/Neu/Bestehender sections exist

    - action: wait
      description: Wait for the list to re-group

  steps:
    # --- L1: structural presence ---
    - action: assert
      page: maschinenpark-geraeteliste
      element: location-header
      expect: { contains: "$location_name" }
      description: L1 - header shows the selected location

    - action: assert
      page: maschinenpark-geraeteliste
      element: device-filter
      expect: visible
      description: L1 - Geräte filtern input present

    - action: assert
      page: maschinenpark-geraeteliste
      element: device-grouping-dropdown
      expect: { value: "IOT-Geräte" }
      description: L1 - Gerätegruppierungen defaults to IOT-Geräte

    - action: assert
      page: maschinenpark-geraeteliste
      element: favoriten-section
      expect: visible
      description: L1 - Favoriten section present

    - action: assert
      page: maschinenpark-geraeteliste
      element: neu-section
      expect: visible
      description: L1 - Neu section present

    - action: assert
      page: maschinenpark-geraeteliste
      element: bestehender-section
      expect: visible
      description: L1 - Bestehender Maschinenpark section present

    # --- C: every Gerätegruppierungen option is selectable and regroups the list.
    #     Invariant checks: the selection applies (dropdown value) and Favoriten is
    #     present under every grouping (C7). Bestehender Maschinenpark is IOT-Geräte
    #     only, so it must vanish under another grouping and return under IOT-Geräte. ---
    - action: input
      page: maschinenpark-geraeteliste
      element: device-grouping-dropdown
      value: "Keine"
      description: C - select grouping "Keine"
    - action: wait
    - action: assert
      page: maschinenpark-geraeteliste
      element: device-grouping-dropdown
      expect: { value: "Keine" }
      description: C - "Keine" applied
    - action: assert
      page: maschinenpark-geraeteliste
      element: favoriten-section
      expect: visible
      description: C7 - Favoriten present under "Keine"

    - action: input
      page: maschinenpark-geraeteliste
      element: device-grouping-dropdown
      value: "Status"
      description: C - select grouping "Status" (-> ONLINE / OFFLINE sections)
    - action: wait
    - action: assert
      page: maschinenpark-geraeteliste
      element: device-grouping-dropdown
      expect: { value: "Status" }
      description: C - "Status" applied
    - action: assert
      page: maschinenpark-geraeteliste
      element: favoriten-section
      expect: visible
      description: C7 - Favoriten present under "Status"

    - action: input
      page: maschinenpark-geraeteliste
      element: device-grouping-dropdown
      value: "Hersteller"
      description: C - select grouping "Hersteller" (-> manufacturer sections)
    - action: wait
    - action: assert
      page: maschinenpark-geraeteliste
      element: device-grouping-dropdown
      expect: { value: "Hersteller" }
      description: C - "Hersteller" applied
    - action: assert
      page: maschinenpark-geraeteliste
      element: bestehender-section
      expect: absent
      description: C - the IOT-only Bestehender section is gone under a non-IOT grouping (proves real regrouping)

    - action: input
      page: maschinenpark-geraeteliste
      element: device-grouping-dropdown
      value: "Modell"
      description: C - select grouping "Modell"
    - action: wait
    - action: assert
      page: maschinenpark-geraeteliste
      element: device-grouping-dropdown
      expect: { value: "Modell" }
      description: C - "Modell" applied

    - action: input
      page: maschinenpark-geraeteliste
      element: device-grouping-dropdown
      value: "Fahrzeugnummer"
      description: C - select grouping "Fahrzeugnummer" (-> FAHRZEUG-NUMMER sections)
    - action: wait
    - action: assert
      page: maschinenpark-geraeteliste
      element: device-grouping-dropdown
      expect: { value: "Fahrzeugnummer" }
      description: C - "Fahrzeugnummer" applied

    - action: input
      page: maschinenpark-geraeteliste
      element: device-grouping-dropdown
      value: "Fahrzeugtyp"
      description: C - select grouping "Fahrzeugtyp"
    - action: wait
    - action: assert
      page: maschinenpark-geraeteliste
      element: device-grouping-dropdown
      expect: { value: "Fahrzeugtyp" }
      description: C - "Fahrzeugtyp" applied

    # NOTE: PARTNER-GRUPPIERUNGEN (e.g. "Test Partner Gruppe") are intentionally
    # NOT asserted here - they are user/company-CREATED data, not a stable contract,
    # and can be added/removed at any time (observed disappearing mid-session). A
    # deterministic test must not reference such records by name. Partner groupings
    # are covered separately by a data-driven test that creates its own scheme in
    # setup (via Maschinenpark Einstellungen) and tears it down. The seven STANDARD
    # groupings above are the stable contract.

    - action: input
      page: maschinenpark-geraeteliste
      element: device-grouping-dropdown
      value: "IOT-Geräte"
      description: C - restore IOT-Geräte for the remaining steps
    - action: wait
    - action: assert
      page: maschinenpark-geraeteliste
      element: bestehender-section
      expect: visible
      description: C - Bestehender section returns under IOT-Geräte (regrouping is reversible)

    # --- L5 + L4: device filter narrows the list and sections re-bind ---
    - action: input
      page: maschinenpark-geraeteliste
      element: device-filter
      value: "$device_filter_term"
      description: L5 - filter the device list

    - action: wait
      description: Filtering is live - wait for the sections to re-render

    - action: assert
      page: maschinenpark-geraeteliste
      element: device-row
      value: "$matching_device"
      expect: visible
      description: L5 - a matching device is still shown

    - action: assert
      page: maschinenpark-geraeteliste
      element: device-row
      value: "$non_matching_device"
      expect: absent
      description: L5 - a non-matching device is removed

    - action: assert
      page: maschinenpark-geraeteliste
      element: no-match-message
      expect: visible
      description: L4 - a section emptied by the filter shows the no-match notice (count re-bound to 0)

    - action: click
      page: maschinenpark-geraeteliste
      element: device-filter-clear
      description: Reset the device filter via its X button

    - action: wait
      description: Wait for the full list to restore

    - action: assert
      page: maschinenpark-geraeteliste
      element: device-row
      value: "$non_matching_device"
      expect: visible
      description: L5 - clearing the filter restores the previously-hidden device

    # --- L5: location sidebar filter ---
    - action: input
      page: maschinenpark-geraeteliste
      element: location-filter
      value: "$location_filter_term"
      description: L5 - filter the location sidebar

    - action: wait
      description: Wait for the sidebar to re-render

    - action: assert
      page: maschinenpark-geraeteliste
      element: location-list-sidebar
      value: "$location_match"
      expect: visible
      description: L5 - the matching location remains in the sidebar

    - action: assert
      page: maschinenpark-geraeteliste
      element: location-list-sidebar
      value: "$location_nonmatch"
      expect: absent
      description: L5 - non-matching locations are removed from the sidebar

    # (The location sidebar filter does not affect the right-hand device pane, so
    #  it need not be reset before L2; a fresh navigation resets all filters.)

    # --- L2: navigation - clicking a device opens the preview drawer ---
    - action: click
      page: maschinenpark-geraeteliste
      element: device-row
      value: "$matching_device"
      description: L2 - open the matching device's preview drawer

    - action: wait
      description: Wait for the drawer to open

    - action: assert
      page: geraet-vorschau
      element: open-full-view-button
      expect: visible
      description: L2 - the preview drawer opened (Vollansicht öffnen present)

    - action: assert
      expect: { url_matches: "/geraete/maschinenpark/.*/geraet/.*" }
      description: L2 - the URL gained a /geraet/{id} segment (deep-linkable drawer)

  verify:
    - L1 - page loads with the location header, device filter, IOT-Geräte grouping, and all three device sections
    - C - every STANDARD Gerätegruppierungen option (Keine, IOT-Geräte, Status, Hersteller, Modell, Fahrzeugnummer, Fahrzeugtyp) is selectable and applies; Favoriten persists across all; the IOT-only Bestehender section disappears under another grouping and returns under IOT-Geräte. (Partner-Gruppierungen are user data - covered by a separate create/teardown test.)
    - L5 - the device filter keeps matching devices and removes non-matching ones; clearing it restores them
    - L4 - an emptied section shows the "keine Maschinen gefunden" notice (counts re-bind to the filter)
    - L5 - the Standort filter narrows the location sidebar
    - L2 - clicking a device opens the preview drawer and appends /geraet/{id} to the URL
