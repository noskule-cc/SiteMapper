workflow:
  name: switch-partner-to-maschinenpark
  description: Switch to a partner account and navigate to their Maschinenpark (machine list)
  site: iot-portal

  parameters:
    - name: partner_name
      type: text
      description: Name or partial name of the partner to switch to
      required: true

  steps:
    - action: navigate
      page: dashboard
      element: hamburger-menu
      description: Open the sidebar navigation

    - action: click
      page: dashboard
      element: nav-adminbereich
      description: Expand the Adminbereich section (click chevron, not text)

    - action: click
      page: dashboard
      element: nav-admin-partner-wechseln
      description: Click Partner wechseln to open partner list

    - action: input
      page: partner-wechseln
      element: search-field
      value: "$partner_name"
      description: Search for the target partner

    - action: click
      page: partner-wechseln
      element: partner-table
      value: "$partner_name"
      description: Click the matching partner row to switch context

    - action: navigate
      page: dashboard
      element: hamburger-menu
      description: Open the sidebar navigation again

    - action: click
      page: dashboard
      element: nav-geraete
      description: Expand the Geräte section (click chevron)

    - action: click
      page: dashboard
      element: nav-geraete-maschinenpark
      description: Click Maschinenpark

    - action: click
      page: maschinenpark
      element: location-filter
      description: "First click: select the location from the list"

    - action: click
      page: maschinenpark
      element: machine-list
      description: "Second click: click the location row chevron (>) to drill into machine list"

  verify:
    - Red banner shows "Sie befinden sich beim Partner: $partner_name"
    - Page title shows MASCHINENPARK
    - Machine list is visible with "Bestehender Maschinenpark" section
