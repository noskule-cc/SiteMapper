page:
  name: Einstellungen - Profil
  url_pattern: /einstellungen/profil
  purpose: User profile settings with personal data, company data, and account management

  elements:
    - name: stammdaten-section
      type: container
      locator:
        strategy: text
        value: Stammdaten
      description: Collapsible section with customer number and location details

    - name: betriebsdaten-section
      type: container
      locator:
        strategy: text
        value: Betriebsdaten
      description: Collapsible section with company/operational data

    - name: ihr-konto-section
      type: container
      locator:
        strategy: text
        value: Ihr Konto
      description: Collapsible section with account settings

    - name: kontoloeschung-button
      type: button
      locator:
        strategy: text
        value: "Kontolöschung veranlassen"
      description: Red button to initiate account deletion

  gotchas:
    - All three sections are collapsed by default
    - Stammdaten shows Kundennummer and location with nested expandable address
    - "Kontolöschung veranlassen" is a destructive action — red button below the sections
