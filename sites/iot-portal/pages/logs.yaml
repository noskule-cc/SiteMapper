page:
  name: Logs
  url_pattern: /logs
  purpose: View application debug/system logs

  elements:
    - name: log-output
      type: container
      locator:
        strategy: css
        value: ".log-output, pre"
      description: Plain text log output with timestamps

  gotchas:
    - Pure text output, no filters, search, or controls
    - Shows app startup info, API connections, JWT interceptor, version number
    - Mostly useful for debugging, not day-to-day operations
    - Logs are from current session only
