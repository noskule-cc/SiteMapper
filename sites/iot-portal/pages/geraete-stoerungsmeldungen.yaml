page:
  name: Geräte - Störungsmeldungen
  url_pattern: /geraete/stoerungsmeldungen/liste
  purpose: View fault reports across all devices (global view)

  elements:
    - name: date-from
      type: input
      locator:
        strategy: css
        value: "input[type='date']:first-of-type"
      description: Start date filter

    - name: date-to
      type: input
      locator:
        strategy: css
        value: "input[type='date']:last-of-type"
      description: End date filter

    - name: search-field
      type: input
      locator:
        strategy: text
        value: "Störungsmeldungen s"
      description: Search fault reports

    - name: schweregrad-filter
      type: select
      locator:
        strategy: text
        value: Schweregrad
      description: Severity level filter

    - name: list-view-toggle
      type: button
      locator:
        strategy: css
        value: ".list-view-icon"
      description: Toggle list view

    - name: map-view-toggle
      type: button
      locator:
        strategy: css
        value: ".map-view-icon"
      description: Toggle map view (location pin icon)

  gotchas:
    - This is the GLOBAL fault reports page (across all devices), different from the per-device tab
    - URL redirects to /geraete/stoerungsmeldungen/liste
    - Has a map view toggle (location pin icon) not present on the per-device tab
    - Can take a few seconds to load
