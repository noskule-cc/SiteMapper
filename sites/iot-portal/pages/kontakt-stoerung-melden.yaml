page:
  name: Kontakt - Störung melden
  url_pattern: /kontakt/stoerung-melden
  purpose: Report a malfunction via appointment booking or contact form

  elements:
    - name: termin-buchen-button
      type: button
      locator:
        strategy: text
        value: Termin vereinbaren
      description: Red button to book an appointment with a service technician

    - name: kontakt-button
      type: button
      locator:
        strategy: text
        value: Kontakt
      description: Red button to open the contact/fault report form

  gotchas:
    - Two options presented as cards, not a form directly
    - "Termin Buchen" books with a technician directly
    - "Formular Störung melden" opens a contact form to Gehrig Group Support
