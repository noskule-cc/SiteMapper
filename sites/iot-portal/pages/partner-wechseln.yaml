page:
  name: Partner wechseln
  url_pattern: /adminbereich/partner-wechseln
  purpose: Switch to a different partner/customer account to view their data

  elements:
    - name: search-field
      type: input
      locator:
        strategy: text
        value: Suche
      description: Search partners by name or contract number

    - name: partner-table
      type: table
      locator:
        strategy: css
        value: "table, .partner-list"
      description: Table with Vertragsnummer and Vertragspartner columns

    - name: partner-verlassen-button
      type: button
      locator:
        strategy: text
        value: Partner verlassen
      description: Red banner button to leave current partner context, only visible when inside a partner

    - name: items-per-page
      type: select
      locator:
        strategy: text
        value: Items per page
      description: Pagination control, default 10

  gotchas:
    - Search filters the full list of 4474 partners live as you type
    - After switching partner, a red banner appears at the top of EVERY page showing "Sie befinden sich beim Partner: <name>"
    - The "Partner verlassen" button in the red banner returns you to your own account
    - Clicking a partner row immediately switches context, no confirmation dialog
    - To reach this page: open sidebar → expand Adminbereich (click chevron) → click "Partner wechseln"
    - Sidebar click targets are tricky: clicking TEXT navigates to page, clicking CHEVRON (>) toggles submenu. They are very close together
    - After switching partner, the sidebar collapses automatically — you must reopen it to navigate further
