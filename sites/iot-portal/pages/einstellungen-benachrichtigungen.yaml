page:
  name: Einstellungen - Meine Benachrichtigungen
  url_pattern: /einstellungen/benachrichtigung
  purpose: Manage personal notification preferences per notification group

  elements:
    - name: benachrichtigungsgruppen-list
      type: container
      locator:
        strategy: text
        value: Benachrichtigungsgruppen
      description: List of notification groups with delivery method and active toggle

    - name: notification-method-select
      type: select
      locator:
        strategy: css
        value: "select, .notification-method"
      description: Delivery method dropdown per group (Push, E-Mail)

    - name: notification-active-toggle
      type: checkbox
      locator:
        strategy: text
        value: Aktiv
      description: Toggle to enable/disable notifications per group

  gotchas:
    - Each notification group shows as a red row with delivery method and active toggle
    - Delivery methods are Push or E-Mail, selected per group
    - Multiple groups can exist for the same partner with different delivery methods
