page:
  name: Dashboard
  url_pattern: /dashboard
  purpose: Main landing page with navigation to all site sections
  screenshot: screenshots/dashboard.png

  elements:
    # Top Navigation
    - name: hamburger-menu
      type: button
      locator:
        strategy: css
        value: ".hamburger-menu, [aria-label='Menu']"
      description: Toggles sidebar open/closed

    - name: page-title
      type: text
      locator:
        strategy: text
        value: DASHBOARD
      description: Current page title in top bar

    - name: filter-button
      type: button
      locator:
        strategy: css
        value: "[aria-label='Filter']"
      description: Funnel icon, opens filter options

    - name: notifications-bell
      type: button
      locator:
        strategy: css
        value: "[aria-label='Notifications']"
      description: Bell icon with notification count badge

    - name: logout-button
      type: button
      locator:
        strategy: css
        value: "[aria-label='Logout']"
      description: Arrow/exit icon, logs out the user

    - name: user-profile
      type: button
      locator:
        strategy: text
        value: Benjamin Behringer
      description: User name and avatar in top right corner

    # Sidebar Navigation
    - name: nav-dashboard
      type: link
      locator:
        strategy: text
        value: Dashboard
      description: Dashboard link (highlighted red when active)
      states: [active, inactive]

    # Sidebar: Dienste
    - name: nav-dienste
      type: link
      locator:
        strategy: text
        value: Dienste
      description: Services section, expandable submenu
      children:
        - name: nav-dienste-wartungsabonnemente
          label: Wartungs-Abonnemente
        - name: nav-dienste-service
          label: Service
        - name: nav-dienste-garantien
          label: Garantien
        - name: nav-dienste-cleanplus
          label: CleanPlus Abonnement
        - name: nav-dienste-montageabklaerung
          label: "Montageabklärung"
        - name: nav-dienste-uebergabeprotokoll
          label: "Übergabeprotokoll"

    # Sidebar: Kontaktformular
    - name: nav-kontaktformular
      type: link
      locator:
        strategy: text
        value: Kontaktformular
      description: Contact form section, expandable submenu
      children:
        - name: nav-kontaktformular-stoerung
          label: "Störung melden"
        - name: nav-kontaktformular-formular
          label: Kontaktformular

    # Sidebar: Geräte
    - name: nav-geraete
      type: link
      locator:
        strategy: text
        value: "Geräte"
      description: Devices section, expandable submenu
      children:
        - name: nav-geraete-maschinenpark
          label: Maschinenpark
        - name: nav-geraete-stoerungsmeldungen
          label: Störungsmeldungen
        - name: nav-geraete-eigenes-geraet
          label: "Eigenes Gerät erfassen"
        - name: nav-geraete-voreinstellungen
          label: Voreinstellungen

    # Sidebar: Shop
    - name: nav-shop
      type: link
      locator:
        strategy: text
        value: Shop
      description: Shop section, expandable submenu
      children:
        - name: nav-shop-produkte
          label: Produkte
        - name: nav-shop-bestellungen
          label: Bestellungen
        - name: nav-shop-ggplus-pay
          label: GGPlus Pay

    # Sidebar: Community
    - name: nav-community
      type: link
      locator:
        strategy: text
        value: Community
      description: Community section, expandable submenu
      children:
        - name: nav-community-partner
          label: Partner

    # Sidebar: Einstellungen
    - name: nav-einstellungen
      type: link
      locator:
        strategy: text
        value: Einstellungen
      description: Settings section, expandable submenu
      children:
        - name: nav-einstellungen-profil
          label: Profil
        - name: nav-einstellungen-dashboard
          label: Dashboard
        - name: nav-einstellungen-benachrichtigungen
          label: Meine Benachrichtigungen

    # Sidebar: Adminbereich
    - name: nav-adminbereich
      type: link
      locator:
        strategy: text
        value: Adminbereich
      description: Admin area, expandable submenu
      children:
        - name: nav-admin-benutzerverwaltung
          label: Benutzerverwaltung
        - name: nav-admin-rollenverwaltung
          label: Rollenverwaltung
        - name: nav-admin-benachrichtigungsverwaltung
          label: Benachrichtigungsverwaltung
        - name: nav-admin-partner-wechseln
          label: Partner wechseln
        - name: nav-admin-gateway-monitoring
          label: Gateway Monitoring

    # Sidebar: No submenu items
    - name: nav-anleitungen
      type: link
      locator:
        strategy: text
        value: GG+connect Anleitungen
      description: Guides/documentation, no submenu

    - name: nav-logs
      type: link
      locator:
        strategy: text
        value: Logs
      description: System logs, no submenu

  gotchas:
    - Sidebar is collapsed by default showing only icons, must click hamburger to see text labels
    - Sidebar items with chevrons have expandable submenus (Dienste, Kontaktformular, Geräte, Shop, Community, Einstellungen, Adminbereich)
    - Anleitungen and Logs have no submenus
    - Active page is highlighted in red in the sidebar
    - "CRITICAL: Clicking sidebar item TEXT navigates to the page. Clicking the CHEVRON toggles the submenu. The click targets are very close — always aim for the chevron arrow when expanding."
    - Sidebar collapses automatically after navigating to a new page
    - When in a partner context, a red banner with "Partner verlassen" appears at the top of every page
