page:
  name: Geräte Detailansicht
  url_pattern: /geraete/geraet/:deviceId
  purpose: Device detail view with tabs for parameters, connectivity, wash cycles, and fault reports

  elements:
    # Header
    - name: device-name
      type: text
      locator:
        strategy: css
        value: "h1, .device-title"
      description: Device model name (e.g., "Gläser- und Geschirrspülmaschine FX-10C, BESTECK PREMIUM")

    - name: partner-name
      type: text
      locator:
        strategy: css
        value: ".partner-name"
      description: Partner name shown above device name

    - name: device-image
      type: container
      locator:
        strategy: css
        value: ".device-image, img"
      description: Product image of the device

    - name: connection-status
      type: text
      locator:
        strategy: text
        value: Status
      description: "Connection status with timestamp (e.g., 'Offline (21.04.2026 15:45)')"

    - name: internal-name
      type: text
      locator:
        strategy: text
        value: "Interner Name:"
      description: Internal device name / access code

    - name: internal-name-edit
      type: button
      locator:
        strategy: css
        value: "[aria-label='Edit'], .edit-icon"
      description: Pencil icon to edit the internal name

    - name: internal-note
      type: text
      locator:
        strategy: text
        value: "Interne Notiz:"
      description: Internal note about the device

    - name: three-dot-menu
      type: button
      locator:
        strategy: css
        value: ".more-options, [aria-label='More']"
      description: Three-dot menu next to device image

    - name: technische-daten-toggle
      type: button
      locator:
        strategy: text
        value: Technische Daten
      description: Expandable section for technical specifications

    # Tabs - only Details + Konnektivität are universal; the rest are
    # capability-dependent and present only on devices that support them
    # (see the tab matrix in gotchas).
    - name: tab-details
      type: button
      locator:
        strategy: text
        value: Details
      description: Details tab - notifications, maintenance, stats. Present on all devices.

    - name: tab-konnektivitaet
      type: button
      locator:
        strategy: text
        value: "Konnektivität"
      description: Connectivity tab - QR code, device registration. Present on all devices.

    - name: tab-maschinenparameter
      type: button
      locator:
        strategy: text
        value: Maschinenparameter
      description: "(capability-dependent) Machine parameters tab - editable device settings. Seen on dishwashers, not on the coffee machine."
      states: [capability-dependent]

    - name: tab-waschgaenge
      type: button
      locator:
        strategy: text
        value: "Waschgänge"
      description: "(capability-dependent) Wash cycles tab - event log with date filter. Seen on the Hobart dishwasher; the GEHRIG GTW dishwasher exposes Hygiene + Spülprogramme instead."
      states: [capability-dependent]

    - name: tab-hygiene
      type: button
      locator:
        strategy: text
        value: Hygiene
      description: "(capability-dependent) Hygiene tab. Seen on the GEHRIG GTW dishwasher, not on the Hobart or the coffee machine."
      states: [capability-dependent]

    - name: tab-spuelprogramme
      type: button
      locator:
        strategy: text
        value: "Spülprogramme"
      description: "(capability-dependent) Wash/rinse programmes tab. Seen on the GEHRIG GTW dishwasher, not on the Hobart or the coffee machine."
      states: [capability-dependent]

    - name: tab-stoerungsmeldungen
      type: button
      locator:
        strategy: text
        value: Störungsmeldungen
      description: "(capability-dependent) Fault reports tab - error log with severity filter. Seen on dishwashers, not on the coffee machine."
      states: [capability-dependent]

    # Details tab elements
    - name: benachrichtigungen-card
      type: container
      locator:
        strategy: text
        value: Benachrichtigungen
      description: Notifications card showing open alerts

    - name: naechste-wartung-card
      type: container
      locator:
        strategy: text
        value: "Nächste Wartung"
      description: Next/last maintenance info with link to service orders

    - name: alle-serviceauftraege-link
      type: link
      locator:
        strategy: text
        value: "Alle Serviceaufträge anzeigen"
      description: Link to full service order list

    - name: reinigungsmittel-card
      type: container
      locator:
        strategy: text
        value: Reinigungsmittel Nachlieferung
      description: Cleaning supply reorder settings (editable)

    - name: chargen-stat
      type: container
      locator:
        strategy: text
        value: Chargen
      description: Batch count statistics

    - name: betriebsstunden-stat
      type: container
      locator:
        strategy: text
        value: Betriebsstunden
      description: Operating hours statistics

    # Maschinenparameter tab elements
    - name: parameter-search
      type: input
      locator:
        strategy: text
        value: Parametersuche
      description: Search field to find specific parameters

    - name: favoriten-markieren-button
      type: button
      locator:
        strategy: text
        value: Favoriten markieren
      description: Toggle favorite marking mode for parameters

    - name: alles-speichern-button
      type: button
      locator:
        strategy: text
        value: Alles Speichern
      description: Save all modified parameters

    # Konnektivität tab elements
    - name: qr-code-card
      type: container
      locator:
        strategy: text
        value: QR Code
      description: QR code with device identification (Kunden-Nr, Maschinen-Typ, Maschinen-Nr, Inbetriebnahme)

    - name: qr-herunterladen-button
      type: button
      locator:
        strategy: text
        value: Herunterladen
      description: Download the QR code

    - name: geraet-verbinden-code
      type: input
      locator:
        strategy: text
        value: "Code*"
      description: Input field to enter a connection code

    - name: registrieren-button
      type: button
      locator:
        strategy: text
        value: Registrieren
      description: Register/connect device with entered code

    # Waschgänge tab elements
    - name: waschgaenge-von
      type: input
      locator:
        strategy: text
        value: Von
      description: Start date filter for wash cycles

    - name: waschgaenge-bis
      type: input
      locator:
        strategy: text
        value: Bis
      description: End date filter for wash cycles

    - name: hygiene-checkbox
      type: checkbox
      locator:
        strategy: text
        value: "Nur Hygiene Waschgänge anzeigen"
      description: Filter to show only hygiene wash cycles

    - name: waschgaenge-aktualisieren
      type: button
      locator:
        strategy: text
        value: Aktualisieren
      description: Refresh wash cycle list with current date filter

    - name: waschgaenge-herunterladen
      type: button
      locator:
        strategy: text
        value: Herunterladen
      description: Download wash cycle data

    # Störungsmeldungen tab elements
    - name: stoerungen-von
      type: input
      locator:
        strategy: text
        value: Von
      description: Start date filter for fault reports

    - name: stoerungen-bis
      type: input
      locator:
        strategy: text
        value: Bis
      description: End date filter for fault reports

    - name: stoerungen-suche
      type: input
      locator:
        strategy: text
        value: "Störungsmeldungen su"
      description: Search field for fault reports

    - name: schweregrad-dropdown
      type: select
      locator:
        strategy: text
        value: Schweregrad
      description: Severity level filter dropdown

    - name: stoerungen-aktualisieren
      type: button
      locator:
        strategy: text
        value: Aktualisieren
      description: Refresh fault report list

    # Persistent elements
    - name: stoerung-melden-button
      type: button
      locator:
        strategy: text
        value: "Störung melden"
      description: Red button at bottom to report a new malfunction, visible on all tabs

  gotchas:
    - "CAPABILITY VARIANT: the tab set depends on the device's capabilities. Only Details + Konnektivität are universal. Observed - Mastrena (coffee): Details, Konnektivität. Hobart GXC-14C (dishwasher): + Maschinenparameter, Waschgänge, Störungsmeldungen. GEHRIG GTW 3300-H (dishwasher): + Maschinenparameter, Hygiene, Spülprogramme, Störungsmeldungen. Two dishwashers differ (Waschgänge vs Hygiene+Spülprogramme). Tabs flagged states:[capability-dependent] are ABSENT on devices that don't support them - never assume a mapped tab is present."
    - '"Störung melden" red button is persistent at the bottom across all tabs'
    - URL uses a UUID for the device ID, not a numeric ID
    - Maschinenparameter values are editable inline via pencil icons, each shows last change timestamp and valid range
    - Parameters with red timestamps indicate recent changes or alerts
    - Waschgänge and Störungsmeldungen default to a 20-day date range
    - '"Technische Daten" is a collapsible section above the tabs'
    - The Von/Bis date pickers appear on both Waschgänge and Störungsmeldungen tabs but are independent
