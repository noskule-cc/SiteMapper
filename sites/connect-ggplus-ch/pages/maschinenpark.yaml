page:
  name: Maschinenpark
  url_pattern: /geraete/maschinenpark
  purpose: View and manage machines/devices for a partner location

  elements:
    - name: search-field
      type: input
      locator:
        strategy: text
        value: Maschine suchen
      description: Search machines by name or serial number

    - name: filter-dropdown
      type: select
      locator:
        strategy: text
        value: Alle Maschinen
      description: Filter machines by category

    - name: add-device-button
      type: button
      locator:
        strategy: text
        value: "Gerät hinzufügen"
      description: Add a new device to the location

    - name: location-filter
      type: input
      locator:
        strategy: text
        value: Standort filtern
      description: Filter by location name (shown on first level before drilling into a location)

    - name: sort-dropdown
      type: select
      locator:
        strategy: text
        value: Sortierung
      description: Sort order for locations (default Name)

    - name: machine-list
      type: container
      locator:
        strategy: text
        value: Bestehender Maschinenpark
      description: List of existing machines with name, description, and QR/serial codes

    - name: new-machines-section
      type: container
      locator:
        strategy: text
        value: Neu (noch nicht im IOT-Hub)
      description: Section for newly added machines not yet connected to IoT Hub

  gotchas:
    - Navigation requires TWO clicks to reach the machine list - first click shows locations, second click on the location row (chevron >) drills into the actual machine list
    - URL pattern is /geraete/maschinenpark/{partnerId}/{locationId} for the machine list view
    - First level shows partner locations with addresses, has "Standort filtern" and "Sortierung" controls
    - Second level shows machines grouped into "Neu (noch nicht im IOT-Hub)" and "Bestehender Maschinenpark"
    - Each machine row has a chevron (>) to view device detail page (geraet-detail)
    - Machines have colored status icons (red = offline/error, green = online)
    - To reach this page: open sidebar → expand Geräte (click chevron) → click "Maschinenpark"
    - The machine list can be long — scroll down to find specific devices, or use "Maschine suchen" search
