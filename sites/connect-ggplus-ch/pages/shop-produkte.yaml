page:
  name: Shop - Produkte
  url_pattern: /shop/kategorie/:categoryId
  purpose: Browse and order products (machines, cleaning supplies, used equipment)

  elements:
    - name: tab-maschinen
      type: button
      locator:
        strategy: text
        value: Maschinen
      description: Machines tab

    - name: tab-reinigungsmittel
      type: button
      locator:
        strategy: text
        value: Reinigungsmittel
      description: Cleaning supplies tab

    - name: tab-gebraucht
      type: button
      locator:
        strategy: text
        value: "Gebraucht- und Ausstellungsgeräte"
      description: Used and display equipment tab

    - name: search-field
      type: input
      locator:
        strategy: text
        value: Suche
      description: Search products

    - name: filter-dropdown
      type: select
      locator:
        strategy: text
        value: Filter
      description: Filter products by category

    - name: cart-icon
      type: button
      locator:
        strategy: css
        value: ".cart-icon, [aria-label='Cart']"
      description: Shopping cart icon in top right

  gotchas:
    - URL uses category IDs (e.g., /shop/kategorie/200 for Maschinen)
    - Product cards show name, description, price in CHF, Details button, and Bestellen dropdown
    - Bestellen has a dropdown arrow suggesting quantity or variant selection
    - Sidebar nav label is "Produkte" but page shows "Shop" as title
