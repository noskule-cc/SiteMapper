page:
  name: Adminbereich - Rollenverwaltung
  url_pattern: /adminbereich/rollenverwaltung
  purpose: Manage user roles and their permissions, assign roles to partners

  elements:
    - name: rolle-hinzufuegen-button
      type: button
      locator:
        strategy: text
        value: "Rolle hinzufügen"
      description: Red button to create a new role

    - name: role-list
      type: container
      locator:
        strategy: css
        value: ".role-list"
      description: List of roles as collapsible grey bars with user count and permission icons

    - name: vertragspartner-search
      type: input
      locator:
        strategy: text
        value: Suche
      description: Search field for partner list below the roles

    - name: vertragspartner-table
      type: table
      locator:
        strategy: text
        value: Vertragspartner
      description: Table with Vertragspartner and Vertragsnummer columns, paginated

  gotchas:
    - Roles are displayed as collapsible grey bars showing role name, user count badge, and permission icons
    - Available roles include Betriebsleiter, Betriebstechniker, GGAG Webshop, Kunde, Küchen Chef, Reinigungsmittel Lieferant
    - Each role bar can be expanded to see/manage assigned users
    - Permission icons on the bars indicate what each role can access
    - Vertragspartner table below shows all partners (4487 total) with pagination
