page:
  name: Shop - Bestellungen
  url_pattern: /shop/bestellungen
  purpose: View open and archived orders

  elements:
    - name: tab-offen
      type: button
      locator:
        strategy: text
        value: Offen
      description: Open orders tab

    - name: tab-archiv
      type: button
      locator:
        strategy: text
        value: Archiv
      description: Archived orders tab

    - name: order-list
      type: container
      locator:
        strategy: css
        value: ".order-list"
      description: Collapsible grey bars with order number and date

  gotchas:
    - Orders displayed as collapsible grey bars showing order number and date (e.g., "615-487987 (26.11.2025)")
    - Click chevron to expand and see order details
