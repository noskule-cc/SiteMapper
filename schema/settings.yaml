# Schema: Settings
# Layered configuration for contact data, agent behavior, and form defaults.
#
# The same `settings:` block may appear at three scopes. Lower (more specific)
# scopes override higher ones, deep-merged per key:
#
#     global  (config.yaml at repo root)
#       └─ site   (sites/<site>/site.yaml)
#            └─ page  (sites/<site>/pages/<page>.yaml)
#
# Resolution = deep merge, most-specific wins. A page that overrides
# settings.contact.email keeps the inherited contact.name / contact.phone.

settings:

  contact:                    # Form-fill / identity values typed into forms.
    name: ""                  #   Full name (e.g. "Benjamin Behringer")
    salutation: ""            #   Salutation / Geschlecht (e.g. "Herr")
    email: ""                 #   Contact email
    phone: ""                 #   Contact phone (e.g. "+41764497275")
    # Any contact field may be overridden at site or page level.

  policy:                     # Flags that tell the agent how to behave on this scope.
    environment: ""           #   dev | staging | production
    safe_to_submit_forms: false
                              #   When true, the agent MAY fill and submit forms on
                              #   this scope without asking (e.g. dev/test sites).
                              #   When false/absent, the agent asks before submitting.

  form_defaults: {}           # Per-page field prefills, keyed by the element `name`
                              # from the page map. Example (on a page YAML):
                              #   form_defaults:
                              #     geraetestatus-select: "Ausser Betrieb"
                              #     stoerung-freetext: "Testmeldung (Dev-Test)"

# Notes:
# - `contact` and `policy` are typically defined globally (config.yaml) and
#   refined per-site; `form_defaults` is typically page-level.
# - `safe_to_submit_forms` is the machine-readable authorization for form
#   submission. Keep it false on production sites.
